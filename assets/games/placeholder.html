<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Démo bientôt disponible</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(255, 213, 79, 0.16), transparent 40%), #0c1d32;
        color: #fff;
        font-family: "Poppins", "Segoe UI", sans-serif;
        text-align: center;
      }
      .placeholder {
        padding: 32px;
      }
      .placeholder__emoji {
        font-size: 2.4rem;
        margin-bottom: 12px;
      }
      .placeholder__title {
        margin: 0 0 8px;
        font-size: 1.1rem;
        font-weight: 700;
      }
      .placeholder__note {
        margin: 0;
        opacity: 0.7;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="placeholder">
      <div class="placeholder__emoji">🎮</div>
      <p class="placeholder__title">Démo en cours de préparation</p>
      <p class="placeholder__note">Le jeu sera bientôt connecté ici.</p>
    </div>
  </body>
</html>
