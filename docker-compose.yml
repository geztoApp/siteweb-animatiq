services:
  demo-counter:
    build: ./demo-counter-server
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    volumes:
      - demo-counter-data:/app/data

  chat:
    build: ./chat-server
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}

  contact:
    build: ./contact-server
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    volumes:
      - contact-data:/app/data

volumes:
  demo-counter-data:
  contact-data:
